  <section class="form">
    <div class="container">
      <form class="form-wrapper form-loggin" autocomplete="off">
        <button class="form-button__toggle-modal" type="button">
          регистрация
        </button>
        <p class="form-title">Войдите в аккаунт</p>

        <div class="form-field">
          <label class="form-label__name" for="form-name">Введите имя</label>
          <input class="form-input__name" type="name" id="form-name" autocomplete="off" />
        </div>
        <div class="form-field">
          <label class="form-label__password" for="form-password">Введите пароль</label>
          <input class="form-input__password" type="password" id="form-password" autocomplete="new-password" />
        </div>
        <div class="form-field form-field__check-password hide">
          <label class="form-label__password" for="form-check__password">Подтвердите пароль</label>
          <input class="form-input__password" type="password" id="form-check__password" autocomplete="new-password" />
        </div>
        <button class="form-button" type="submit">войти</button>
      </form>
    </div>
  </section>

  <div class="modal hide">
    <div class="container">
      <div class="modal-wrapper">
        <p class="modal-result" data-i18n=""></p>

        <span class="modal-time__span"></span>
        <div class="modal-btn__wrapper">
          <button class="modal-btn__menu" data-i18n="inMenu"></button>
          <button class="modal-btn__restart" data-i18n="restart"></button>
        </div>
      </div>
    </div>
  </div>

  <section class="menu hide">
    <div class="container">
      <div class="menu-wrapper">
        <ul class="menu-list">
          <li class="menu-item">
            <button class="menu-btn" id="menu-play" data-i18n="start"></button>
          </li>
          <li class="menu-item">
            <button class="menu-btn" id="menu-settings" data-i18n="setting"></button>
          </li>
          <li class="menu-item">
            <button class="menu-btn" id="menu-credits" data-i18n="creators"></button>
          </li>
          <li class="menu-item">
            <button class="menu-btn" id="menu-exit" data-i18n="exit"></button>
          </li>
        </ul>
      </div>
    </div>
  </section>

  <section class="settings hide">
    <div class="container">
      <div class="settings-wrapper">
        <div class="settings-input__wrap">
          <label for="range-volume__music" class="settings-label__range" data-i18n="volumeMusic">
          </label>
          <input type="range" id="range-volume__music" class="settings-input__range" min="0" max="100" value="50" />
          <div class="settings-input__volume" id="div-volume__music">
            <span></span>
          </div>
        </div>

        <div class="settings-input__wrap">
          <label for="range-volume__sound" class="settings-label__range" data-i18n="volumeSound">
          </label>
          <input type="range" id="range-volume__sound" class="settings-input__range" min="0" max="100" value="50" />
          <div class="settings-input__volume" id="div-volume__sound">
            <span></span>
          </div>
        </div>
        <fieldset class="settings-language__wrap">
          <legend class="settings-language__title" data-i18n="language"></legend>

          <div class="settings-language__btn-wrap">
            <button class="settings-language__btn lang-btn__rus" data-i18n="nameLanguageRus"></button>
            <button class="settings-language__btn lang-btn__eng" data-i18n="nameLanguageEng"></button>
          </div>
        </fieldset>
        <button class="settings-btn__back" data-i18n="menu"></button>
      </div>
    </div>
  </section>

  <section class="game hide">
    <div class="container">
      <div class="game-wrapper">
        <div class="game-bar">
          <div class="game-bar__wrap">
            <button class="game-bar__btn game-bar__menu">
              <i class="fa-solid fa-house"></i>
            </button>
            <button class="game-bar__btn game-bar__reset">
              <i class="fa-solid fa-arrow-rotate-right"></i>
            </button>
          </div>
          <div class="game-bar__wrap">
            <button class="game-bar__btn game-bar__music">
              <i class="fa-solid fa-music"></i>
            </button>
            <button class="game-bar__btn game-bar__volume">
              <i class="fa-solid fa-volume-high"></i>
            </button>
          </div>
        </div>
        <div class="game-timer">0:30</div>
        <div class="game-timer__group">
          <div class="game-timer__visible">
            <span></span>
          </div>
        </div>

        <div class="game-field"></div>
      </div>
    </div>
  </section>
